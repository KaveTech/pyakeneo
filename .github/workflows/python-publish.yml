# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: "ubuntu-22.04"

    steps:
      - name: Get Executor token
        id: executor
        uses: getsentry/action-github-app-token@v4.0.0
        with:
          app_id: ${{ secrets.ACTION_EXECUTOR_ID }}
          private_key: ${{ secrets.ACTION_EXECUTOR_KEY }}

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Build package
        run: poetry build

      - name: Publish PyPi package
        uses: code-specialist/pypi-poetry-publish@v1.2
        with:
          PYTHON_VERSION: "3.11.13"
          POETRY_VERSION: "2.1.3"
          ACCESS_TOKEN: ${{ steps.executor.outputs.token }}
          PUBLISH_REGISTRY_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
